# Build the in-browser spfy WASM demo and deploy it to GitHub Pages.
#
# The demo lives under spfy/wasm/. It compiles the synth core
# (emulator-backed SWIttsFe + USel + WSOLA) to WebAssembly via Emscripten.
# Voices are NOT baked in: stage_voices.py lays each shipped voice's
# vin/vdb/vcf out under dist/voices/ (splitting any file >90 MiB into
# <100 MB parts for Pages' per-file limit) and the browser fetches only
# the voice the visitor selects.
#
# Triggers:
#   * push to main, filtered to paths that actually affect the wasm
#     build — the build is expensive (~5-10 min cold) so we skip it
#     when only unrelated files changed.
#   * workflow_dispatch — manual rebuild / first-time setup.
#
# Repository setup (one-time, in the GitHub UI):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# Output URL: https://<user>.github.io/<repo>/
# Asset paths in the bundle are relative, so the demo works under any
# subpath (no PUBLIC_URL / base-path rewriting needed).
#
# Notes on size: the module is ~14 MB (code + the three small SWIttsFe
# DLLs). Voice corpora ship as separate objects under voices/ and are
# fetched on demand — a visitor only downloads the voice(s) they pick, and
# the browser HTTP cache makes repeat loads free. Pages does not
# content-encode .wasm / .vdb, so those ship uncompressed; that is
# inherent to the (already-compact) audio data.

name: Deploy WASM demo to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "spfy/wasm/**"
      - "spfy/src/**"
      - "spfy/include/**"
      - "en-US/tom/**"
      - "en-US/jill/**"
      - "es-MX/javier/**"
      - "fr-CA/felix/**"
      - ".github/workflows/deploy-wasm-pages.yml"
  workflow_dispatch:

# Pages deployments use OIDC for keyless auth + need write access to
# the Pages environment. contents:read is the default but spelled out
# for clarity.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy per ref. We do NOT cancel-in-progress because
# Pages deployments are atomic — letting a build finish + publish is
# safer than cancelling mid-deploy and risking a partial state.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # --------------------------------------------------------------------
  # build — emscripten + webpack. Produces build/web/ ready to ship.
  # --------------------------------------------------------------------

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      # Emscripten SDK. The setup action caches the toolchain across
      # runs keyed by version, so warm runs install in seconds.
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "latest"
          actions-cache-folder: "emsdk-cache"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: spfy/wasm/package-lock.json

      - name: Install JS deps
        working-directory: spfy/wasm
        run: npm ci

      # Compile C → wasm. Emits spfy/wasm/dist/spfy_wasm.{js,wasm} and
      # stages the lazy voice assets + manifest under dist/voices/ (only
      # the voices whose files are present in the checkout — the gitignored
      # large voices like Paulina are simply omitted from the manifest).
      - name: Build WASM module
        working-directory: spfy/wasm
        # Invoke via `bash` rather than `./build.sh` — the script may
        # not carry an executable bit through a Windows git checkout.
        run: bash build.sh

      # Webpack production bundle into spfy/wasm/build/web/. Copies the
      # emscripten outputs through verbatim alongside the page HTML/CSS/JS.
      - name: Bundle web app
        working-directory: spfy/wasm
        run: npm run build

      # GitHub Pages runs files through Jekyll by default, which silently
      # drops anything starting with "_" (some emscripten internals can).
      # .nojekyll disables that pre-processing.
      - name: Disable Jekyll
        run: touch spfy/wasm/build/web/.nojekyll

      - name: List bundle contents
        run: ls -lh spfy/wasm/build/web/

      # Real-browser smoke test — the deploy gate. Drives headless Chrome
      # (pre-installed on ubuntu-latest; Selenium Manager auto-provisions
      # the matching chromedriver) through the built bundle: loads Tom,
      # switches to Felix (fresh module + a real network fetch), and
      # synthesizes each. If the loader or synth path is broken the step
      # exits non-zero and the deploy job (needs: build) never runs.
      #
      # Paulina is skipped (--no-paulina): CI must not depend on the
      # external voice host being up, nor pull her 253 MB every run.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke-test deps
        run: pip install "selenium>=4.11"

      - name: Smoke test the built demo (headless Chrome)
        working-directory: spfy/wasm
        run: python tools/smoke_test.py --no-paulina

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: spfy/wasm/build/web

  # --------------------------------------------------------------------
  # deploy — publish the artifact to the github-pages environment.
  # --------------------------------------------------------------------

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
